name: Deploy portfolio to GitHub Pages

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Install portfolio dependencies
        run: pnpm --dir artifacts/portfolio install --no-frozen-lockfile --ignore-scripts
      - name: Build portfolio
        run: pnpm --dir artifacts/portfolio build
      - name: Copy Pages metadata
        run: |
          cp CNAME artifacts/portfolio/dist/public/CNAME
          touch artifacts/portfolio/dist/public/.nojekyll
      - name: Configure Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/portfolio/dist/public

  deploy:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deployment.outputs.page_url }}"
